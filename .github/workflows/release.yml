name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 20)

          echo -n "$CERTIFICATE_P12" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BUILD_NUMBER=${GITHUB_RUN_NUMBER}
          echo "Setting version to $VERSION ($BUILD_NUMBER)"
          sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = $VERSION;/" Pine.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*;/CURRENT_PROJECT_VERSION = $BUILD_NUMBER;/" Pine.xcodeproj/project.pbxproj

      - name: Build archive
        run: |
          xcodebuild archive \
            -project Pine.xcodeproj \
            -scheme Pine \
            -archivePath $RUNNER_TEMP/Pine.xcarchive \
            -destination "generic/platform=macOS" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Export app
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Pine.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent "$RUNNER_TEMP/export/Pine.app" "$RUNNER_TEMP/Pine.zip"

          xcrun notarytool submit "$RUNNER_TEMP/Pine.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait | tee /tmp/notarytool-output.txt

          SUBMISSION_ID=$(grep -o '[0-9a-f\-]\{36\}' /tmp/notarytool-output.txt | head -1)
          if grep -q "Invalid" /tmp/notarytool-output.txt; then
            echo "Notarization failed, fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi

          xcrun stapler staple "$RUNNER_TEMP/export/Pine.app"

      - name: Create DMG
        run: |
          DMG_TEMP=$RUNNER_TEMP/dmg-content
          mkdir -p "$DMG_TEMP"
          cp -R "$RUNNER_TEMP/export/Pine.app" "$DMG_TEMP/"
          ln -s /Applications "$DMG_TEMP/Applications"

          hdiutil create -volname "Pine" \
            -srcfolder "$DMG_TEMP" \
            -ov -format UDZO \
            "$RUNNER_TEMP/Pine.dmg"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Rename DMG with version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mv "$RUNNER_TEMP/Pine.dmg" "$RUNNER_TEMP/Pine-${VERSION}.dmg"

      - name: Download Sparkle tools
        run: |
          SPARKLE_VERSION="2.9.0"
          curl -L -o "$RUNNER_TEMP/Sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xf "$RUNNER_TEMP/Sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"

      - name: Sign DMG with EdDSA
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is not set"
            exit 1
          fi
          VERSION=${{ steps.version.outputs.VERSION }}
          SIGN_OUTPUT=$("$RUNNER_TEMP/sparkle/bin/sign_update" "$RUNNER_TEMP/Pine-${VERSION}.dmg" --ed-key-file <(echo "$SPARKLE_PRIVATE_KEY"))
          echo "SPARKLE_SIGNATURE=$SIGN_OUTPUT" >> $GITHUB_ENV

      - name: Generate appcast.xml
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")
          # Extract edSignature and length from sign_update output
          ED_SIGNATURE=$(echo "$SPARKLE_SIGNATURE" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          LENGTH=$(echo "$SPARKLE_SIGNATURE" | sed -n 's/.*length="\([^"]*\)".*/\1/p')

          cat > "$RUNNER_TEMP/appcast.xml" << APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Pine</title>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${GITHUB_RUN_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>26.0</sparkle:minimumSystemVersion>
                <sparkle:releaseNotesLink>https://github.com/batonogov/pine/releases/tag/v${VERSION}</sparkle:releaseNotesLink>
                <enclosure url="https://github.com/batonogov/pine/releases/download/v${VERSION}/Pine-${VERSION}.dmg"
                  sparkle:edSignature="${ED_SIGNATURE}"
                  length="${LENGTH}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          APPCAST_EOF

      - name: Validate appcast.xml
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          DMG_FILENAME="Pine-${VERSION}.dmg"
          EXPECTED_URL="https://github.com/batonogov/pine/releases/download/v${VERSION}/${DMG_FILENAME}"
          ACTUAL_URL=$(sed -n 's/.*enclosure url="\([^"]*\)".*/\1/p' "$RUNNER_TEMP/appcast.xml" | tr -d ' ')
          if [ "$ACTUAL_URL" != "$EXPECTED_URL" ]; then
            echo "::error::Appcast DMG URL mismatch"
            echo "  Expected: $EXPECTED_URL"
            echo "  Actual:   $ACTUAL_URL"
            exit 1
          fi
          if [ ! -f "$RUNNER_TEMP/$DMG_FILENAME" ]; then
            echo "::error::DMG file not found: $DMG_FILENAME"
            exit 1
          fi
          echo "Appcast URL and DMG file validated successfully"

      - name: Upload DMG to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              "$RUNNER_TEMP/Pine-${VERSION}.dmg" \
              "$RUNNER_TEMP/appcast.xml"
          else
            gh release create "$GITHUB_REF_NAME" \
              "$RUNNER_TEMP/Pine-${VERSION}.dmg" \
              "$RUNNER_TEMP/appcast.xml" \
              --title "Pine ${VERSION}" \
              --generate-notes
          fi

      - name: Update Homebrew Tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          SHA256=$(shasum -a 256 "$RUNNER_TEMP/Pine-${VERSION}.dmg" | awk '{print $1}')

          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/batonogov/homebrew-tap.git $RUNNER_TEMP/homebrew-tap
          cd $RUNNER_TEMP/homebrew-tap
          sed -i '' "s/version \".*\"/version \"$VERSION\"/" Casks/pine-editor.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"$SHA256\"/" Casks/pine-editor.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/pine-editor.rb
          git commit -m "Update Pine to $VERSION"
          git push

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
