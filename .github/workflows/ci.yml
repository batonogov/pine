# NOTE: All third-party actions are pinned by full commit SHA for supply-chain safety.
# To update an action: find the new version's commit SHA on GitHub (Tags → verify commit),
# replace the SHA, and keep the "# vX" comment in sync.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # Detect whether the PR/push touches only docs/config files.
  # When only non-code files change, downstream jobs are skipped —
  # GitHub treats skipped required checks as passed because
  # strict_required_status_checks_policy is OFF in branch protection.
  # If strict policy is ever enabled, skipped jobs will BLOCK merges.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Check for code changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # On branch creation, github.event.before is the null SHA — fall back to parent
          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi

          # List changed files, exclude docs/config-only paths
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -cvE '^(.*\.md|docs/.*|assets/.*|LICENSE|\.github/ISSUE_TEMPLATE/.*|\.release-please-manifest\.json|release-please-config\.json)$' || true)

          if [ "$CHANGED" -gt 0 ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "Code changes detected ($CHANGED files)"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only changes, skipping CI jobs"
          fi

  lint:
    name: SwiftLint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      SWIFTLINT_VERSION: "0.63.2"
      SWIFTLINT_SHA256: "dd1017cfd20a1457f264590bcb5875a6ee06cd75b9a9d4f77cd43a552499143b"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install SwiftLint
        run: |
          curl -fSL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/swiftlint_linux_amd64.zip" -o swiftlint.zip
          echo "${SWIFTLINT_SHA256}  swiftlint.zip" | sha256sum -c -
          unzip -o swiftlint.zip
          chmod +x swiftlint
          sudo mv swiftlint /usr/local/bin/

      - name: Run SwiftLint
        run: swiftlint --strict

  build:
    name: Build for Testing
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Cache SPM Dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: DerivedData/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('Pine.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build App
        run: |
          xcodebuild build \
            -project Pine.xcodeproj \
            -scheme Pine \
            -destination "platform=macOS" \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO

      - name: Build for Testing
        run: |
          xcodebuild build-for-testing \
            -project Pine.xcodeproj \
            -scheme Pine \
            -destination "platform=macOS" \
            -derivedDataPath DerivedData \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO

      - name: Smoke Test — Verify App Bundle
        run: |
          APP_PATH=$(find DerivedData/Build/Products -name "Pine.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Pine.app not found in build products"
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          # Verify the app bundle structure and binary is executable
          BINARY="$APP_PATH/Contents/MacOS/Pine"
          if [ ! -x "$BINARY" ]; then
            echo "::error::Pine binary not found or not executable at: $BINARY"
            exit 1
          fi
          echo "Binary is executable: $BINARY"

          # Verify Info.plist exists
          if [ ! -f "$APP_PATH/Contents/Info.plist" ]; then
            echo "::error::Info.plist not found in app bundle"
            exit 1
          fi
          echo "Info.plist present"

          # Verify binary is a valid Mach-O executable
          file "$BINARY" | grep -q "Mach-O" || { echo "::error::Binary is not a valid Mach-O executable"; exit 1; }
          echo "Binary is valid Mach-O"

          echo "Smoke test passed"

      - name: Archive Build Products
        run: tar -cf build-products.tar --exclude='DerivedData/ModuleCache' DerivedData

      - name: Upload Build Products
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-products
          path: build-products.tar
          retention-days: 1
          compression-level: 1

  unit-tests:
    name: Unit Tests
    runs-on: macos-26
    needs: build
    env:
      COVERAGE_THRESHOLD: 70
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Download Build Products
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-products

      - name: Extract Build Products
        run: tar -xf build-products.tar

      - name: Unit Tests
        run: |
          xcodebuild test-without-building \
            -project Pine.xcodeproj \
            -scheme Pine \
            -destination "platform=macOS" \
            -derivedDataPath DerivedData \
            -only-testing:PineTests \
            -retry-tests-on-failure \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO

      - name: Detect Flaky Tests
        if: success() || failure()
        id: flaky
        run: |
          python3 .github/scripts/detect_flaky_tests.py \
            TestResults.xcresult --github-summary

      - name: Extract Coverage Report
        if: success() || failure()
        id: coverage
        run: |
          XCRESULT="TestResults.xcresult"
          if [ ! -d "$XCRESULT" ]; then
            echo "No .xcresult bundle found"
            exit 0
          fi

          # Get JSON coverage report
          xcrun xccov view --report --json "$XCRESULT" > coverage.json

          # Extract coverage for Pine target, excluding pure SwiftUI view files
          # (views are covered by UI tests separately)
          COVERAGE=$(python3 -c "
          import json, sys
          EXCLUDED_VIEWS = {
              'AccessibilityIdentifiers.swift',
              'BranchSubtitleClickHandler.swift',
              'BranchSwitcherView.swift',
              'CodeEditorView.swift',
              'ContentView.swift',
              'ContentView+Helpers.swift',
              'PaneLeafView.swift',
              'EditorTabBar.swift',
              'FileNodeRow.swift',
              'GitAndNotificationObserver.swift',
              'MarkdownPreviewView.swift',
              'QuickLookPreviewView.swift',
              'QuickOpenView.swift',
              'RecoveryDialogView.swift',
              'RepresentedFileTracker.swift',
              'SearchResultsView.swift',
              'SidebarView.swift',
              'StatusBarView.swift',
              'PaneTreeView.swift',
              'TerminalBarView.swift',
              'TerminalPaneContent.swift',
              'TerminalPaneTabBar.swift',
              'TerminalSearchBar.swift',
              'WelcomeView.swift',
          }
          with open('coverage.json') as f:
              data = json.load(f)
          for target in data.get('targets', []):
              if target['name'] == 'Pine.app':
                  covered = 0
                  total = 0
                  for f in target.get('files', []):
                      if f['name'] in EXCLUDED_VIEWS:
                          continue
                      covered += f.get('coveredLines', 0)
                      total += f.get('executableLines', 0)
                  pct = (covered / total * 100) if total > 0 else 0
                  print(f'{pct:.1f}')
                  sys.exit(0)
          print('0.0')
          ")

          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "## Code Coverage: ${COVERAGE}%" >> "$GITHUB_STEP_SUMMARY"

          # Generate per-file breakdown for top/bottom files
          python3 -c "
          import json
          EXCLUDED_VIEWS = {
              'AccessibilityIdentifiers.swift',
              'BranchSubtitleClickHandler.swift',
              'BranchSwitcherView.swift',
              'CodeEditorView.swift',
              'ContentView.swift',
              'ContentView+Helpers.swift',
              'PaneLeafView.swift',
              'EditorTabBar.swift',
              'FileNodeRow.swift',
              'GitAndNotificationObserver.swift',
              'MarkdownPreviewView.swift',
              'QuickLookPreviewView.swift',
              'QuickOpenView.swift',
              'RecoveryDialogView.swift',
              'RepresentedFileTracker.swift',
              'PaneTreeView.swift',
              'SearchResultsView.swift',
              'SidebarView.swift',
              'StatusBarView.swift',
              'TerminalBarView.swift',
              'TerminalPaneContent.swift',
              'TerminalPaneTabBar.swift',
              'TerminalSearchBar.swift',
              'WelcomeView.swift',
          }
          with open('coverage.json') as f:
              data = json.load(f)
          for target in data.get('targets', []):
              if target['name'] != 'Pine.app':
                  continue
              files = []
              excluded = []
              for f in target.get('files', []):
                  name = f['name']
                  pct = f['lineCoverage'] * 100
                  entry = (name, pct, f.get('coveredLines', 0), f.get('executableLines', 0))
                  if name in EXCLUDED_VIEWS:
                      excluded.append(entry)
                  else:
                      files.append(entry)
              files.sort(key=lambda x: x[1])

              print('### Lowest Coverage Files (logic only)')
              print('| File | Coverage | Lines |')
              print('|------|----------|-------|')
              for name, pct, covered, total in files[:10]:
                  if total > 0:
                      print(f'| {name} | {pct:.1f}% | {covered}/{total} |')

              print()
              print('### Highest Coverage Files')
              print('| File | Coverage | Lines |')
              print('|------|----------|-------|')
              for name, pct, covered, total in files[-10:]:
                  if total > 0:
                      print(f'| {name} | {pct:.1f}% | {covered}/{total} |')

              if excluded:
                  excluded_lines = sum(t for _, _, _, t in excluded)
                  print()
                  print(f'_Excluded from threshold: {len(excluded)} pure SwiftUI view files ({excluded_lines} lines) — covered by UI tests._')
          " >> "$GITHUB_STEP_SUMMARY"

      - name: Check Coverage Threshold
        if: (success() || failure()) && steps.coverage.outputs.coverage != ''
        run: |
          COVERAGE="${{ steps.coverage.outputs.coverage }}"
          THRESHOLD="${{ env.COVERAGE_THRESHOLD }}"
          echo "Coverage: ${COVERAGE}%, threshold: ${THRESHOLD}%"
          if python3 -c "exit(0 if float('$COVERAGE') >= float('$THRESHOLD') else 1)"; then
            echo "✅ Coverage is above threshold"
          else
            echo "::error::Coverage ${COVERAGE}% is below ${THRESHOLD}% threshold"
            exit 1
          fi

      - name: Comment Coverage on PR
        if: (success() || failure()) && github.event_name == 'pull_request' && steps.coverage.outputs.coverage != ''
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          COVERAGE_VALUE: ${{ steps.coverage.outputs.coverage }}
          COVERAGE_MIN: ${{ env.COVERAGE_THRESHOLD }}
          FLAKY_COUNT: ${{ steps.flaky.outputs.flaky-count }}
          FLAKY_TESTS: ${{ steps.flaky.outputs.flaky-tests }}
        with:
          script: |
            const coverage = process.env.COVERAGE_VALUE;
            const threshold = parseFloat(process.env.COVERAGE_MIN);
            const passing = parseFloat(coverage) >= threshold;
            const icon = passing ? '✅' : '❌';

            const flakyCount = parseInt(process.env.FLAKY_COUNT || '0', 10);
            // FLAKY_TESTS is JSON-encoded by the detection script
            let flakyTests = '';
            try { flakyTests = JSON.parse(process.env.FLAKY_TESTS || '""'); } catch (e) { flakyTests = process.env.FLAKY_TESTS || ''; }

            const lines = [
              `## ${icon} Code Coverage: ${coverage}%`,
              '',
              `Threshold: ${threshold}%`,
              '',
              `${passing ? 'Coverage is above the minimum threshold.' : '**Coverage is below the minimum threshold. This is a blocking check — the PR cannot be merged.**'}`,
            ];

            if (flakyCount > 0) {
              lines.push('', `### Flaky Tests: ${flakyCount}`, '');
              lines.push(`${flakyTests}`);
              lines.push('', '_These tests failed initially but passed on retry._');
            }

            lines.push('', '_Generated by CI — see job summary for detailed file-level breakdown._');
            const body = lines.join('\n');

            // Find existing coverage comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Code Coverage:')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # Verify every UI test class is listed in the shard matrix below.
  # Fails CI if someone adds a new test class and forgets to shard it.
  verify-ui-shards:
    name: Verify UI Test Shards
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check all UI test classes are sharded
        run: |
          # Extract concrete test class names (exclude base class PineUITestCase and on-demand ScreenshotTests)
          ACTUAL=$(grep -rh 'class.*:.*PineUITestCase' PineUITests/ \
            | sed -E 's/.*class ([A-Za-z0-9_]+).*/\1/' \
            | grep -v ScreenshotTests \
            | sort)

          # Extract class names from this workflow's shard matrix
          SHARDED=$(grep -E '^\s+\-only-testing:PineUITests/' .github/workflows/ci.yml \
            | sed -E 's/.*PineUITests\/([A-Za-z0-9_]+).*/\1/' \
            | sort)

          MISSING=$(comm -23 <(echo "$ACTUAL") <(echo "$SHARDED"))
          if [ -n "$MISSING" ]; then
            echo "::error::UI test classes not included in any shard:"
            echo "$MISSING"
            echo ""
            echo "Add them to the ui-tests matrix in .github/workflows/ci.yml"
            exit 1
          fi
          echo "All $(echo "$ACTUAL" | wc -l | tr -d ' ') UI test classes are sharded."

  # UI test shards — 7 parallel jobs, ~14-18 tests each.
  # To rebalance: count tests per class, redistribute so shards stay within ±3 tests.
  # List classes with: grep -r "func test" PineUITests/ | sed 's/:.*//' | sort | uniq -c | sort -rn
  ui-tests:
    name: "UI Tests (${{ matrix.shard-name }})"
    runs-on: macos-26
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          # Shard 1 — Welcome (14 tests)
          - shard-name: "Welcome"
            test-classes: >-
              -only-testing:PineUITests/WelcomeWindowTests
          # Shard 2 — Editor & Gutter (15 tests)
          - shard-name: "Editor & Gutter"
            test-classes: >-
              -only-testing:PineUITests/EditorWindowTests
              -only-testing:PineUITests/LineNumberGutterUITests
          # Shard 3 — Files & Branch (15 tests)
          - shard-name: "Files & Branch"
            test-classes: >-
              -only-testing:PineUITests/DeleteTests
              -only-testing:PineUITests/BranchSwitcherTests
              -only-testing:PineUITests/DiffNavigationUITests
          # Shard 4 — Search & Duplicate (15 tests)
          - shard-name: "Search & Duplicate"
            test-classes: >-
              -only-testing:PineUITests/SidebarSearchTests
              -only-testing:PineUITests/DuplicateTests
              -only-testing:PineUITests/MinimapTests
              -only-testing:PineUITests/BlameViewTests
          # Shard 5 — Security & Terminal (15 tests)
          - shard-name: "Security & Terminal"
            test-classes: >-
              -only-testing:PineUITests/SymlinkSecurityUITests
              -only-testing:PineUITests/MultiWindowTests
              -only-testing:PineUITests/TerminalTests
              -only-testing:PineUITests/ToggleCommentTests
          # Shard 6 — Git & Font (14 tests)
          - shard-name: "Git & Font"
            test-classes: >-
              -only-testing:PineUITests/GitignoreFilterTests
              -only-testing:PineUITests/FontSizeTests
              -only-testing:PineUITests/CheckForUpdatesTests
          # Shard 7 — Navigation (18 tests)
          - shard-name: "Navigation"
            test-classes: >-
              -only-testing:PineUITests/GoToLineTabOverflowExternalChangesUITests
              -only-testing:PineUITests/QuickOpenUITests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Download Build Products
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-products

      - name: Extract Build Products
        run: tar -xf build-products.tar

      # matrix.test-classes expands to multiple -only-testing: flags via YAML folded scalar (>-)
      - name: UI Tests
        run: |
          xcodebuild test-without-building \
            -project Pine.xcodeproj \
            -scheme Pine \
            -destination "platform=macOS" \
            -derivedDataPath DerivedData \
            -retry-tests-on-failure \
            -resultBundlePath UITestResults.xcresult \
            ${{ matrix.test-classes }} \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO

      - name: Detect Flaky Tests
        if: success() || failure()
        run: |
          python3 .github/scripts/detect_flaky_tests.py \
            UITestResults.xcresult --github-summary \
            --output-file flaky-shard-${{ strategy.job-index }}.json

      - name: Upload Flaky Report
        if: success() || failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: flaky-ui-${{ strategy.job-index }}
          path: flaky-shard-${{ strategy.job-index }}.json
          retention-days: 1

  # Aggregate flaky UI test reports from all shards into a single PR comment
  flaky-summary:
    name: Flaky Test Summary
    runs-on: ubuntu-latest
    needs: ui-tests
    if: always() && needs.ui-tests.result != 'cancelled' && needs.ui-tests.result != 'skipped'
    steps:
      - name: Download Flaky Reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: flaky-ui-*
          merge-multiple: true
          path: flaky-reports

      - name: Aggregate Flaky Tests
        id: aggregate
        run: |
          # Merge all JSON reports into one list
          MERGED=$(python3 -c "
          import json, glob
          all_flaky = []
          for f in sorted(glob.glob('flaky-reports/flaky-shard-*.json')):
              with open(f) as fh:
                  data = json.load(fh)
                  all_flaky.extend(data)
          print(json.dumps(all_flaky))
          ")

          COUNT=$(echo "$MERGED" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
          echo "flaky-count=$COUNT" >> "$GITHUB_OUTPUT"

          if [ "$COUNT" -gt 0 ]; then
            # Build markdown table
            TABLE=$(echo "$MERGED" | python3 -c "
          import json, sys
          tests = json.load(sys.stdin)
          lines = []
          for t in sorted(tests, key=lambda x: (x['suite'], x['name'])):
              lines.append(f\"| {t['suite']} | {t['name']} | {t['failed_runs']}/{t['total_runs']} |\")
          print('\n'.join(lines))
          ")

            {
              echo "## Flaky UI Tests: $COUNT"
              echo ""
              echo "| Test Suite | Test Name | Failed Runs |"
              echo "|------------|-----------|-------------|"
              echo "$TABLE"
              echo ""
              echo "_These tests failed initially but passed on retry._"
            } >> "$GITHUB_STEP_SUMMARY"

            # Store for PR comment (JSON-encoded for safety)
            NAMES=$(echo "$MERGED" | python3 -c "
          import json, sys
          tests = json.load(sys.stdin)
          print(json.dumps(', '.join(f\"{t['suite']}/{t['name']}\" for t in tests)))
          ")
            echo "flaky-tests=$NAMES" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment Flaky UI Tests on PR
        if: github.event_name == 'pull_request' && steps.aggregate.outputs.flaky-count != '0' && steps.aggregate.outputs.flaky-count != ''
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          FLAKY_COUNT: ${{ steps.aggregate.outputs.flaky-count }}
          FLAKY_TESTS: ${{ steps.aggregate.outputs.flaky-tests }}
        with:
          script: |
            const count = process.env.FLAKY_COUNT;
            let tests = '';
            try { tests = JSON.parse(process.env.FLAKY_TESTS || '""'); } catch (e) { tests = process.env.FLAKY_TESTS || ''; }

            const body = [
              `## Flaky UI Tests: ${count}`,
              '',
              tests,
              '',
              '_These tests failed initially but passed on retry. See job summary for details._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Flaky UI Tests:')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
