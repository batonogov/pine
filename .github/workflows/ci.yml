# NOTE: All third-party actions are pinned by full commit SHA for supply-chain safety.
# To update an action: find the new version's commit SHA on GitHub (Tags → verify commit),
# replace the SHA, and keep the "# vX" comment in sync.
name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".release-please-manifest.json"
      - "release-please-config.json"
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".release-please-manifest.json"
      - "release-please-config.json"

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            ui:
              - 'Pine/**/*.swift'
              - 'Pine.xcodeproj/**'
              - 'PineUITests/**'
              - 'Pine.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/**'
              - '.github/workflows/ci.yml'
              - 'version.txt'

  lint:
    name: SwiftLint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --strict

  build:
    name: Build for Testing
    runs-on: macos-26
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Build App
        run: |
          xcodebuild build \
            -project Pine.xcodeproj \
            -scheme Pine \
            -destination "platform=macOS" \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO

      - name: Build for Testing
        run: |
          xcodebuild build-for-testing \
            -project Pine.xcodeproj \
            -scheme Pine \
            -destination "platform=macOS" \
            -derivedDataPath DerivedData \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive Build Products
        run: tar -cf build-products.tar --exclude='DerivedData/ModuleCache' DerivedData

      - name: Upload Build Products
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-products
          path: build-products.tar
          retention-days: 1
          compression-level: 1

  unit-tests:
    name: Unit Tests
    runs-on: macos-26
    needs: build
    env:
      COVERAGE_THRESHOLD: 70
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Download Build Products
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-products

      - name: Extract Build Products
        run: tar -xf build-products.tar

      - name: Unit Tests
        run: |
          xcodebuild test-without-building \
            -project Pine.xcodeproj \
            -scheme Pine \
            -destination "platform=macOS" \
            -derivedDataPath DerivedData \
            -only-testing:PineTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO

      - name: Extract Coverage Report
        if: success() || failure()
        id: coverage
        run: |
          XCRESULT="TestResults.xcresult"
          if [ ! -d "$XCRESULT" ]; then
            echo "No .xcresult bundle found"
            exit 0
          fi

          # Get JSON coverage report
          xcrun xccov view --report --json "$XCRESULT" > coverage.json

          # Extract coverage for Pine target, excluding pure SwiftUI view files
          # (views are covered by UI tests separately)
          COVERAGE=$(python3 -c "
          import json, sys
          EXCLUDED_VIEWS = {
              'ContentView.swift',
              'EditorTabBar.swift',
              'WelcomeView.swift',
              'SearchResultsView.swift',
              'BranchSwitcherView.swift',
              'RecoveryDialogView.swift',
              'TerminalSearchBar.swift',
              'BranchSubtitleClickHandler.swift',
              'MarkdownPreviewView.swift',
              'QuickLookPreviewView.swift',
              'RepresentedFileTracker.swift',
              'AccessibilityIdentifiers.swift',
          }
          with open('coverage.json') as f:
              data = json.load(f)
          for target in data.get('targets', []):
              if target['name'] == 'Pine.app':
                  covered = 0
                  total = 0
                  for f in target.get('files', []):
                      if f['name'] in EXCLUDED_VIEWS:
                          continue
                      covered += f.get('coveredLines', 0)
                      total += f.get('executableLines', 0)
                  pct = (covered / total * 100) if total > 0 else 0
                  print(f'{pct:.1f}')
                  sys.exit(0)
          print('0.0')
          ")

          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "## Code Coverage: ${COVERAGE}%" >> "$GITHUB_STEP_SUMMARY"

          # Generate per-file breakdown for top/bottom files
          python3 -c "
          import json
          EXCLUDED_VIEWS = {
              'ContentView.swift',
              'EditorTabBar.swift',
              'WelcomeView.swift',
              'SearchResultsView.swift',
              'BranchSwitcherView.swift',
              'RecoveryDialogView.swift',
              'TerminalSearchBar.swift',
              'BranchSubtitleClickHandler.swift',
              'MarkdownPreviewView.swift',
              'QuickLookPreviewView.swift',
              'RepresentedFileTracker.swift',
              'AccessibilityIdentifiers.swift',
          }
          with open('coverage.json') as f:
              data = json.load(f)
          for target in data.get('targets', []):
              if target['name'] != 'Pine.app':
                  continue
              files = []
              excluded = []
              for f in target.get('files', []):
                  name = f['name']
                  pct = f['lineCoverage'] * 100
                  entry = (name, pct, f.get('coveredLines', 0), f.get('executableLines', 0))
                  if name in EXCLUDED_VIEWS:
                      excluded.append(entry)
                  else:
                      files.append(entry)
              files.sort(key=lambda x: x[1])

              print('### Lowest Coverage Files (logic only)')
              print('| File | Coverage | Lines |')
              print('|------|----------|-------|')
              for name, pct, covered, total in files[:10]:
                  if total > 0:
                      print(f'| {name} | {pct:.1f}% | {covered}/{total} |')

              print()
              print('### Highest Coverage Files')
              print('| File | Coverage | Lines |')
              print('|------|----------|-------|')
              for name, pct, covered, total in files[-10:]:
                  if total > 0:
                      print(f'| {name} | {pct:.1f}% | {covered}/{total} |')

              if excluded:
                  excluded_lines = sum(t for _, _, _, t in excluded)
                  print()
                  print(f'_Excluded from threshold: {len(excluded)} pure SwiftUI view files ({excluded_lines} lines) — covered by UI tests._')
          " >> "$GITHUB_STEP_SUMMARY"

      - name: Check Coverage Threshold
        if: (success() || failure()) && steps.coverage.outputs.coverage != ''
        run: |
          COVERAGE="${{ steps.coverage.outputs.coverage }}"
          THRESHOLD="${{ env.COVERAGE_THRESHOLD }}"
          echo "Coverage: ${COVERAGE}%, threshold: ${THRESHOLD}%"
          if python3 -c "exit(0 if float('$COVERAGE') >= float('$THRESHOLD') else 1)"; then
            echo "Coverage is above threshold"
          else
            echo "::warning::Coverage ${COVERAGE}% is below ${THRESHOLD}% threshold"
          fi

      - name: Comment Coverage on PR
        if: (success() || failure()) && github.event_name == 'pull_request' && steps.coverage.outputs.coverage != ''
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const coverage = '${{ steps.coverage.outputs.coverage }}';
            const threshold = parseFloat('${{ env.COVERAGE_THRESHOLD }}');
            const passing = parseFloat(coverage) >= threshold;
            const icon = passing ? '✅' : '⚠️';

            const body = [
              `## ${icon} Code Coverage: ${coverage}%`,
              '',
              `Threshold: ${threshold}%`,
              '',
              `${passing ? 'Coverage is above the minimum threshold.' : '**Coverage is below the minimum threshold.**'}`,
              '',
              '_Generated by CI — see job summary for detailed file-level breakdown._'
            ].join('\n');

            // Find existing coverage comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Code Coverage:')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # Verify every UI test class is listed in the shard matrix below.
  # Fails CI if someone adds a new test class and forgets to shard it.
  verify-ui-shards:
    name: Verify UI Test Shards
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: ${{ needs.changes.outputs.ui == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check all UI test classes are sharded
        run: |
          # Extract concrete test class names (exclude base class PineUITestCase)
          ACTUAL=$(grep -rh 'class.*:.*PineUITestCase' PineUITests/ \
            | sed -E 's/.*class ([A-Za-z0-9_]+).*/\1/' \
            | sort)

          # Extract class names from this workflow's shard matrix
          SHARDED=$(grep -E '^\s+\-only-testing:PineUITests/' .github/workflows/ci.yml \
            | sed -E 's/.*PineUITests\/([A-Za-z0-9_]+).*/\1/' \
            | sort)

          MISSING=$(comm -23 <(echo "$ACTUAL") <(echo "$SHARDED"))
          if [ -n "$MISSING" ]; then
            echo "::error::UI test classes not included in any shard:"
            echo "$MISSING"
            echo ""
            echo "Add them to the ui-tests matrix in .github/workflows/ci.yml"
            exit 1
          fi
          echo "All $(echo "$ACTUAL" | wc -l | tr -d ' ') UI test classes are sharded."

  # UI test shards — 4 parallel jobs, ~21 tests each.
  # To rebalance: count tests per class, redistribute so shards stay within ±3 tests.
  # List classes with: grep -r "func test" PineUITests/ | sed 's/:.*//' | sort | uniq -c | sort -rn
  ui-tests:
    name: "UI Tests (${{ matrix.shard-name }})"
    runs-on: macos-26
    needs: [build, changes]
    if: ${{ needs.changes.outputs.ui == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Shard 1 — Window & Welcome (21 tests)
          - shard-name: "Window & Welcome"
            test-classes: >-
              -only-testing:PineUITests/WelcomeWindowTests
              -only-testing:PineUITests/SidebarSearchTests
          # Shard 2 — Editor Core (21 tests)
          - shard-name: "Editor Core"
            test-classes: >-
              -only-testing:PineUITests/EditorWindowTests
              -only-testing:PineUITests/FontSizeTests
              -only-testing:PineUITests/DiffNavigationUITests
              -only-testing:PineUITests/LineNumberGutterUITests
          # Shard 3 — File Operations (20 tests)
          - shard-name: "File Operations"
            test-classes: >-
              -only-testing:PineUITests/DeleteTests
              -only-testing:PineUITests/DuplicateTests
              -only-testing:PineUITests/MultiWindowTests
              -only-testing:PineUITests/MinimapTests
          # Shard 4 — Git, Terminal & Misc (21 tests)
          - shard-name: "Git, Terminal & Misc"
            test-classes: >-
              -only-testing:PineUITests/SymlinkSecurityUITests
              -only-testing:PineUITests/BranchSwitcherTests
              -only-testing:PineUITests/GitignoreFilterTests
              -only-testing:PineUITests/TerminalTests
              -only-testing:PineUITests/CheckForUpdatesTests
              -only-testing:PineUITests/BlameViewTests
              -only-testing:PineUITests/ToggleCommentTests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Download Build Products
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-products

      - name: Extract Build Products
        run: tar -xf build-products.tar

      # matrix.test-classes expands to multiple -only-testing: flags via YAML folded scalar (>-)
      - name: UI Tests
        run: |
          xcodebuild test-without-building \
            -project Pine.xcodeproj \
            -scheme Pine \
            -destination "platform=macOS" \
            -derivedDataPath DerivedData \
            ${{ matrix.test-classes }} \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO
