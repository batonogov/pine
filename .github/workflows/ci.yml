# NOTE: All third-party actions are pinned by full commit SHA for supply-chain safety.
# To update an action: find the new version's commit SHA on GitHub (Tags → verify commit),
# replace the SHA, and keep the "# vX" comment in sync.
name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".release-please-manifest.json"
      - "release-please-config.json"
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".release-please-manifest.json"
      - "release-please-config.json"

permissions:
  contents: read

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --strict

  unit-tests:
    name: Unit Tests
    runs-on: macos-26
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Unit Tests
        run: |
          xcodebuild test \
            -project Pine.xcodeproj \
            -scheme Pine \
            -destination "platform=macOS" \
            -only-testing:PineTests \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO

  ui-tests:
    name: UI Tests
    runs-on: macos-26
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: UI Tests
        run: |
          xcodebuild test \
            -project Pine.xcodeproj \
            -scheme Pine \
            -destination "platform=macOS" \
            -only-testing:PineUITests \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO
