# NOTE: All third-party actions are pinned by full commit SHA for supply-chain safety.
name: Update Screenshots

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  screenshots:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run screenshot tests and extract
        # The script soft-fails xcodebuild but hard-fails if extraction
        # produces no usable PNGs. Do NOT add continue-on-error here.
        run: bash scripts/update-screenshots.sh

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: screenshots-xcresult
          path: build/screenshots.xcresult
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit screenshots
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Remove diagnostic fallback artifacts (screenshot-unknown-*.png)
          # so they never accidentally end up in a commit. They are also
          # gitignored, but be explicit and defensive.
          rm -f assets/screenshot-unknown-*.png

          # Stage only the canonical, named screenshots. We explicitly
          # enumerate them (rather than `assets/screenshot-*.png`) so a
          # stray ignored path can never make `git add` exit non-zero
          # under `bash -e` — that exact failure mode is what historically
          # blocked this workflow on every release tag.
          shopt -s nullglob
          NAMED=(
            assets/screenshot-welcome.png
            assets/screenshot-editor.png
            assets/screenshot-terminal.png
            assets/screenshot-markdown.png
            assets/screenshot-sidebar.png
            assets/screenshot-minimap.png
          )
          EXISTING=()
          for f in "${NAMED[@]}"; do
            [ -f "$f" ] && EXISTING+=("$f")
          done
          if [ "${#EXISTING[@]}" -eq 0 ]; then
            echo "Error: no canonical screenshots found in assets/." >&2
            exit 1
          fi
          # --force: if any of these paths is ever (re-)added to .gitignore
          # by mistake, we still want the workflow to succeed.
          git add --force "${EXISTING[@]}"

          if git diff --staged --quiet; then
            echo "No screenshot changes to commit."
            exit 0
          fi
          git commit -m "chore: update screenshots"
          git push
