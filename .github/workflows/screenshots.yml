# NOTE: All third-party actions are pinned by full commit SHA for supply-chain safety.
name: Update Screenshots

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  screenshots:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run screenshot tests and extract
        # The script soft-fails xcodebuild but hard-fails if extraction
        # produces no usable PNGs. Do NOT add continue-on-error here.
        run: bash scripts/update-screenshots.sh

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: screenshots-xcresult
          path: build/screenshots.xcresult
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit screenshots
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add assets/screenshot-*.png
          if git diff --staged --quiet; then
            echo "No screenshot changes to commit."
            exit 0
          fi
          git commit -m "chore: update screenshots"
          git push
