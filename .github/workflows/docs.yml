name: Docs

on:
  pull_request:
    branches: [main]
    paths:
      - "*.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  docs-check:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Docs validation
        run: echo "Docs-only PR — no build required"
